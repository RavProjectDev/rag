services:
  rag-api:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: LOCAL      # LOCAL bypasses JWT auth — no real user token needed
      PORT: "8080"
      UPSTASH_REDIS_REST_TOKEN: ""   # disable rate limiting so test runs don't consume quota
      UPSTASH_REDIS_REST_URL: ""
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
