name: Deploy API to Google Cloud Run (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: rag-api-prd
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  DOCKER_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/rag

jobs:
  deploy:
    name: Build and Deploy to Cloud Run (Production)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:prd-latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Sync secrets to GCP Secret Manager
        run: |
          sync_secret() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "Skipping $name (no value provided)"
              return
            fi
            if gcloud secrets describe "$name" --quiet 2>/dev/null; then
              echo -n "$value" | gcloud secrets versions add "$name" --data-file=-
              echo "Updated secret: $name"
            else
              echo -n "$value" | gcloud secrets create "$name" --data-file=- --replication-policy=automatic
              echo "Created secret: $name"
            fi
          }
          sync_secret "OPENAI_API_KEY"           "${{ secrets.OPENAI_API_KEY }}"
          sync_secret "MONGODB_URI"              "${{ secrets.MONGODB_URI }}"
          sync_secret "PINECONE_API_KEY"         "${{ secrets.PINECONE_API_KEY }}"
          sync_secret "GEMINI_API_KEY"           "${{ secrets.GEMINI_API_KEY }}"
          sync_secret "UPSTASH_REDIS_REST_TOKEN" "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          sync_secret "SUPABASE_SERVICE_ROLE_KEY" "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          sync_secret "SUPABASE_ANON_KEY"        "${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --service-account=${{ env.GCP_SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=50 \
            --timeout=300 \
            --port=8080 \
            --concurrency=80 \
            --set-env-vars="ENVIRONMENT=PRD" \
            --set-secrets="OPENAI_API_KEY=OPENAI_API_KEY:latest" \
            --set-secrets="MONGODB_URI=MONGODB_URI:latest" \
            --set-secrets="PINECONE_API_KEY=PINECONE_API_KEY:latest" \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest" \
            --set-secrets="UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest" \
            --set-secrets="SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest" \
            --set-secrets="SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest"

      - name: Show service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "🚀 Production API deployed successfully!"
          echo "Service URL: $SERVICE_URL"
          echo "Health check: $SERVICE_URL/api/v1/health"
          echo "API Documentation: $SERVICE_URL/docs"
